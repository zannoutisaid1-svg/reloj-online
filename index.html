<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reloj Online Gratis</title>
  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
    }
    #clock {
      font-size: 80px;
      font-weight: bold;
    }
    .ads {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div id="clock"></div>

<div class="ads">
  <!-- Aquí irá publicidad -->
  <p>Publicidad</p>
</div>

<script>
function updateClock() {
  const now = new Date();
  let h = String(now.getHours()).padStart(2, '0');
  let m = String(now.getMinutes()).padStart(2, '0');
  let s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
